apis:
  - aid: pendo:engage-api
    name: Pendo Engage API
    description: >-
      The Pendo Engage API provides programmatic access to product analytics data
      and in-app guide management — visitors, accounts, features, pages, guides,
      reports, metadata, and aggregations. Used to push and pull product usage
      data and to manage Pendo configuration outside the UI.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://engageapi.pendo.io/
    baseURL: https://app.pendo.io/api/v1
    tags:
      - Product Analytics
      - In-App Guidance
      - REST
    properties:
      - type: Documentation
        url: https://engageapi.pendo.io/
      - type: Developers
        url: https://www.pendo.io/developers/
      - type: Authentication
        url: https://engageapi.pendo.io/#section/Authentication
